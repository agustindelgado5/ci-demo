name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'  

      - name: Restore dependencies
        run: dotnet restore ./Tests/Tests.csproj

      - name: Build project
        run: dotnet build ./Tests/Tests.csproj --no-restore --configuration Release

      - name: Run tests
        run: dotnet test ./Tests/Tests.csproj --no-build --configuration Release --logger "github"